<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GAPNINJA Battery Log</title>
<link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">GN</span>
      <div class="brand-text">
        <strong>GAPNINJA</strong>
        <span>Battery History Log</span>
      </div>
    </div>

    <div class="search-wrap">
      <input id="search-input" type="text" placeholder="Search battery e.g. 1, 0001 or GNB-0001" autocomplete="off" />
      <button id="search-btn">Search</button>
    </div>

    <div class="topbar-actions">
      <button class="btn ghost" id="btn-machines">Machines</button>
      <button class="btn ghost" id="btn-new-machine">+ Machine</button>
      <button class="btn primary" id="btn-new-battery">+ Battery</button>
      <a class="btn ghost" href="/logout" id="btn-logout" title="Sign out">Sign out</a>
    </div>
  </header>

  <main id="view-root"></main>
</div>

<div id="modal-root"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
