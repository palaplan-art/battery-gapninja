<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GAPNINJA History Log</title>
<link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">GN</span>
      <div class="brand-text">
        <strong>GAPNINJA</strong>
        <span>History Log</span>
      </div>
    </div>

    <nav class="topbar-nav">
      <button class="nav-btn" id="btn-batteries">Batteries</button>
      <button class="nav-btn" id="btn-machines">Machines</button>
      <button class="nav-btn" id="btn-sync">Excel Sync</button>
    </nav>

    <div class="topbar-actions">
      <button class="btn ghost" id="btn-new-machine">+ Machine</button>
      <button class="btn primary" id="btn-new-battery">+ Battery</button>
      <a class="btn ghost" href="/logout" id="btn-logout" title="Sign out">Sign out</a>
    </div>
  </header>

  <main id="view-root"></main>
</div>

<div id="modal-root"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
