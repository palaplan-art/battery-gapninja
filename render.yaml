services:
  - type: web
    name: gapninja-battery-log
    runtime: docker
    plan: free                       # free web instance (no persistent disk)
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false                   # paste your Neon Postgres connection string here (kept out of the repo)
      - key: SESSION_SECRET
        generateValue: true           # Render auto-generates a strong random value
      - key: SESSION_HTTPS_ONLY
        value: "1"                    # Render serves over HTTPS
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false                   # set in the Render dashboard, never stored in the repo
      # --- Microsoft Graph / SharePoint Excel sync ---
      # All set in the Render dashboard so no tenant details or secrets live in
      # this public repo. Sync stays disabled until these are present.
      - key: GRAPH_CLIENT_ID
        sync: false
      - key: GRAPH_TENANT_ID
        sync: false
      - key: GRAPH_CLIENT_SECRET
        sync: false
      - key: SHAREPOINT_HOSTNAME
        sync: false
      - key: SHAREPOINT_SITE_PATH
        sync: false
      - key: EXCEL_ITEM_ID
        sync: false
